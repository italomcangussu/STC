<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>STC Play</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f97316" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">


  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@^3.6.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script>
    // The public championship host (camp.stcplay.com.br) must NOT be installable
    // as a PWA — otherwise installing from the championship page captures it as
    // the app start URL and every launch opens the championship view. That view
    // is reachable via the in-app "Campeonatos" tab instead. Keep this host in
    // sync with PUBLIC_CHAMPIONSHIPS_HOST in lib/publicRoutes.ts.
    var PUBLIC_CHAMPIONSHIPS_HOST = 'camp.stcplay.com.br';
    var isPublicChampionshipHost =
      window.location.hostname.toLowerCase() === PUBLIC_CHAMPIONSHIPS_HOST;

    if (isPublicChampionshipHost) {
      // Strip the manifest + web-app meta tags so the page is not installable.
      document.querySelectorAll(
        'link[rel="manifest"], meta[name="apple-mobile-web-app-capable"], meta[name="mobile-web-app-capable"]'
      ).forEach(function (el) { el.remove(); });
    } else if ('serviceWorker' in navigator) {
      // Register Service Worker for Push Notifications (main app only)
      window.addEventListener('load', async () => {
        try {
          const registration = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
          console.log('[App] Service Worker registered:', registration.scope);
        } catch (error) {
          console.error('[App] Service Worker registration failed:', error);
        }
      });
    }
  </script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
